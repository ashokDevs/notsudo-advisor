<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NotSudo Advisor — Reachability-aware CVE triage</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="tokens.css?v=2">
<style>
  body { background: var(--bg); color: var(--text); margin: 0; font-family: Inter, system-ui, sans-serif; }
  #root { min-height: 100vh; }
  /* Static auth bar — works even if React/Babel is slow or cached */
  #static-auth-bar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
    padding: 12px 20px;
    background: rgba(8,11,18,0.92);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
  }
  #static-auth-bar .brand {
    font-family: "Geist Mono", ui-monospace, monospace;
    font-weight: 600; font-size: 14px; color: #e8eef4;
    text-decoration: none;
  }
  #static-auth-bar .actions { display: flex; align-items: center; gap: 10px; }
  #static-auth-bar a.btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 12px; text-decoration: none;
    padding: 8px 12px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.12);
    color: #e8eef4;
  }
  #static-auth-bar a.btn:hover { border-color: rgba(249,115,22,0.5); color: #fff; }
  #static-auth-bar a.btn-primary {
    background: #f97316; border-color: #f97316; color: #0b0f14; font-weight: 600;
  }
  #static-auth-bar a.btn-primary:hover { filter: brightness(1.05); }
  body.react-ready #static-auth-bar { display: none; }
</style>
</head>
<body data-screen-label="Landing">

<!-- ALWAYS works: plain HTML OAuth — no React required -->
<div id="static-auth-bar">
  <a class="brand" href="/Landing.html">NotSudo</a>
  <div class="actions">
    <a class="btn" id="static-signin" href="/auth/github/login?next=/Dashboard.html">
      <!-- github glyph -->
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      Sign in with GitHub
    </a>
    <a class="btn btn-primary" href="/Dashboard.html">Open dashboard →</a>
  </div>
</div>

<div id="root"></div>

<script>
  // Show OAuth errors even without React
  (function () {
    try {
      var q = new URLSearchParams(location.search);
      var err = q.get("oauth_error");
      if (err) {
        var bar = document.getElementById("static-auth-bar");
        var msg = document.createElement("div");
        msg.style.cssText = "width:100%;font:12px/1.4 ui-monospace,monospace;color:#f87171;margin-top:6px";
        msg.textContent = "Sign in failed: " + err;
        bar.appendChild(msg);
      }
    } catch (e) {}
  })();
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- cache-bust so browsers pick up new landing.jsx after deploy -->
<script type="text/babel" src="tweaks-panel.jsx?v=3"></script>
<script type="text/babel" src="shared.jsx?v=3"></script>
<script type="text/babel" src="hero-scan.jsx?v=3"></script>
<script type="text/babel" src="landing.jsx?v=3"></script>
<script>
  // Hide static bar once React Nav mounts successfully
  window.addEventListener("load", function () {
    setTimeout(function () {
      if (document.querySelector("#root header") || document.querySelector("#root .btn")) {
        document.body.classList.add("react-ready");
      }
    }, 1500);
  });
</script>
</body>
</html>
