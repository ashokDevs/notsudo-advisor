# Blueprint: https://render.com/deploy?repo=https://github.com/ashokDevs/notsudo-advisor
services:
  - type: web
    name: notsudo-advisor
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: NOTSUDO_HASH_EMBEDDINGS
        value: "1"
      - key: SESSION_SECRET
        generateValue: true
      # Set these in the Render dashboard after create (or paste during blueprint confirm):
      - key: APP_BASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_API_BASE
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_DEMO_REPO
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
